<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f66ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#g1)" opacity="0.15"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.6"/>
  <!-- V shape - VANCROX logo mark -->
  <polygon points="20,22 50,75 80,22 70,22 50,58 30,22" fill="url(#g2)" filter="url(#glow)"/>
  <!-- Inner diamond accent -->
  <polygon points="50,40 60,55 50,70 40,55" fill="url(#g1)" opacity="0.5"/>
</svg>
